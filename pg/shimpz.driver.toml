schema_version = 1
id = "postgresql"
title = "PostgreSQL"
version = "3.0.0"
summary = "Managed PostgreSQL databases isolated per Team and App."
interface = "shimpz.postgresql/v1"
scope = "space"
credential_policy = "managed"
data_plane = "direct"
port = 7072
health_path = "/healthz"
metadata_path = "/v1/driver"

[capabilities]
operations = [
  "team.provision",
  "team.finalize",
  "team.drop",
  "team.app.create",
  "team.app.drop",
]
