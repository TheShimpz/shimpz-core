# Selects the Shimpz Assistant manifest format understood by the runtime.
schema_version = 2

# Human-readable identity. Shimpz derives the immutable `shimpz-assistant` id
# from this name when the Assistant is first registered.
name = "Shimpz Assistant"

# One concise sentence telling people and the Team Brain what this Assistant does.
summary = "Explore safe OAuth Accounts and just-in-time BYOK Secrets through real X and Mux Powers."

# One or more valid GitHub users responsible for this Assistant.
creators = ["@roxygens"]

# Optional public source repository. This is not a creator profile.
github = "https://github.com/TheShimpz/shimpz-assistant"

# Exact public DNS hosts this Assistant needs. The Team egress proxy denies
# every host not listed here; schemes, paths, ports, wildcards and IPs are not
# valid entries.
allowed_hosts = [
  "api.mux.com",
  "api.x.com",
]

# Declares one provider-owned Account. Shimpz owns authorization,
# refresh, revocation and encrypted token custody; the Assistant receives only
# a short-lived access token during a Power invocation.
[accounts.x]
provider = "x"
scopes = ["tweet.read", "users.read", "tweet.write", "offline.access"]

# Declares manual BYOK values by purpose, never by environment-variable name.
# The Admin asks for a Secret only when a selected Power first needs it. Shimpz
# stores it encrypted per Team and injects only the exact declared subset into
# that Power invocation.
[secrets.mux-token-id]
name = "Mux Token ID"
summary = "The ID half of a Mux access token with Video Read and Write permissions."

[secrets.mux-token-secret]
name = "Mux Token Secret"
summary = "The secret half of the same Mux access token."

[secrets.mux-webhook-signing-secret]
name = "Mux Webhook Signing Secret"
summary = "The signing secret for the exact Mux webhook endpoint whose event is being verified."

[powers.public-user-lookup]
summary = "Read one public X profile by username."
approval = "never"
accounts = ["x"]

[powers.identity-me]
summary = "Read the connected X account identity."
approval = "never"
accounts = ["x"]

[powers.create-post]
summary = "Publish one Post after explicit approval."
approval = "always"
accounts = ["x"]

[powers.delete-post]
summary = "Delete one owned Post after explicit approval."
approval = "always"
accounts = ["x"]

[powers.list-direct-uploads]
summary = "List a bounded page of recent Mux direct uploads."
approval = "never"
secrets = ["mux-token-id", "mux-token-secret"]

[powers.create-test-direct-upload]
summary = "Create a short-lived Mux test upload intent without uploading media."
approval = "always"
secrets = ["mux-token-id", "mux-token-secret"]

[powers.cancel-direct-upload]
summary = "Cancel one waiting Mux direct upload after explicit approval."
approval = "always"
secrets = ["mux-token-id", "mux-token-secret"]

[powers.verify-mux-webhook]
summary = "Verify one recent Mux webhook signature locally without network access."
approval = "never"
secrets = ["mux-webhook-signing-secret"]
